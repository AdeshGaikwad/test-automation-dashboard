spring:
  application:
    name: test-automation-dashboard

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/test_dashboard_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        '[format_sql]': true

  # ── Redis ───────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # ── Email ───────────────────────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ── Server ──────────────────────────────────────────────────────────────────
server:
  port: 8081

# ── Springdoc / Swagger ──────────────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    '[com.testdashboard]': DEBUG
    '[org.hibernate.SQL]': DEBUG